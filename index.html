<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVR Beach Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="hero">
    <div>
        <!-- Add the game-button class to the link -->
        <a href="dashboard.html" id="detailsButton" class="game-button">Click here for details</a>
    </div>

    <script>
        // Preload the sound files
        const hoverSound = new Audio("../sounds/hover.mp3");
        const clickSound = new Audio("../sounds/click.mp3");

        // Get the details button
        const detailsButton = document.getElementById("detailsButton");

        // Add hover sound to the details button
        detailsButton.addEventListener("mouseenter", () => {
            console.log('Hover event triggered'); // Debug log
            hoverSound.play();
        });

        // Add click sound to the details button
        detailsButton.addEventListener("click", () => {
            console.log('Click event triggered'); // Debug log
            clickSound.play();
        });
    </script>

    <script src="game.js"></script>
</body>
</html>
