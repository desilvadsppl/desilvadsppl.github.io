<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVR Beach Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="hero">
    <div>
        <a href="dashboard.html" id="detailsButton" class="game-button">Click here for details</a>
    </div>

    <script>
        const hoverSound = new Audio("sounds/hover.mp3");
        const clickSound = new Audio("sounds/click.mp3");

        document.body.addEventListener('click', () => {
            hoverSound.play().catch(() => {});
            clickSound.play().catch(() => {});
        }, { once: true });

        const detailsButton = document.getElementById("detailsButton");
        detailsButton.addEventListener("mouseenter", () => hoverSound.play());
        detailsButton.addEventListener("click", () => clickSound.play());
    </script>
</body>
</html>
